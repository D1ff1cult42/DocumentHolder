server:
  port: 8081

jwt:
  private-key: ${PRIVATE_KEY}
  access-token-expiration: ${ACCESS_TOKEN_EXPIRATION}
  issuer: ${ISSUER}
  refresh-token-expiration: ${REFRESH_TOKEN_EXPIRATION}
  key-ID: ${KEY_ID}
security:
  first-deletion-warning: ${FIRST_DELETION_WARNING}
  second-deletion-warning: ${SECOND_DELETION_WARNING}
  account-deletion-time: ${ACCOUNT_DELETION_TIME}
spring:
  application:
    name: auth-service
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      timeout: 2s
  datasource:
    url: ${AUTH_DATASOURCE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    baseline-version: 0
    validate-on-migrate: true

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health