global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: dcholder
    environment: local

scrape_configs:
  - job_name: auth-service
    static_configs:
      - targets: ['auth-service:8081']
    metrics_path: /actuator/prometheus
    scrape_interval: 10s
  - job_name: postgres
    static_configs:
      - targets: [ 'postgres-exporter:9187' ]
    scrape_interval: 15s
  - job_name: redis
    static_configs:
      - targets: [ 'redis-exporter:9121' ]